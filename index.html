<style>
    ::-webkit-scrollbar {
        display: none;
    }
    @font-face {
        font-family: "Helvetica";
        src: url("./font/Helvetica.ttf") format("ttf");
        font-weight: normal;
        font-style: normal;
    }

    body{
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100dvh;
        height: fit-content;
        width: 100dvw;
        font-family: "Helvetica";
        overflow: scroll;
        background-color: rgb(77,175,88);
        color: rgb(43, 45, 33);
    }

    .main{
        margin-top: 1.5dvw;
        min-height: calc(100dvh - 1.5dvw);
        height: fit-content;
        width: 97dvw;
        display: flex;
        flex-direction: column;
        gap: 1.5dvw;
    }

    div{
        line-height: 0.8;
        display: inline;
        font-size: 17.5cqw;
        background-color: bl;
    }

    .myself{
        display: flex;
        justify-content: end;
        min-height: 20px;
        height: 30dvw;
        max-height: 500px;
        width: auto;
    }

    .space{
        height: 14dvw;
    }

    .link{
        display: flex;
        flex-direction: column;
        align-items: end;
        gap: 1.5dvw;
    }
    
    .title_link{
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: fit-content;
        width: 100%;
    }

    .social{
        display: flex;
        align-items: flex-start;
    }

    .social>*{
        text-decoration: none;
    }

    button{
        color: inherit;
        font-family: inherit;
        font-size: inherit;
        background-color: transparent;
        text-decoration: underline;
        border: none;
    }

    a{
        color: inherit;
    }

    .hide{
        display: none;
    }

    .projectImage{
        width: 100%;
        height: auto;
    }

    .social.insta{
        margin-top: auto;
    }

    .arrow_outward{
        filter: brightness(0) saturate(100%) invert(13%) sepia(21%) saturate(585%) hue-rotate(30deg) brightness(96%) contrast(89%);
        line-height: 0.63;
        height: 10cqw;
    }

    .arrow_down{
        filter: brightness(0) saturate(100%) invert(13%) sepia(21%) saturate(585%) hue-rotate(30deg) brightness(96%) contrast(89%);
        line-height: 0.63;
        width: 15cqw;
    }

    .arrow_up{
        filter: brightness(0) saturate(100%) invert(13%) sepia(21%) saturate(585%) hue-rotate(30deg) brightness(96%) contrast(89%);
        line-height: 0.63;
        width: 15cqw;
        rotate: 180deg;
    }
</style>
